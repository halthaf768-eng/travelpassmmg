<script>
    const IMGBB_API_KEY = "736039f4a67aa41a88a5e6c98662e01d";

    const fileInput = document.getElementById('adminImgFile');
    const uploadBtn = document.getElementById('uploadBtn');
    const imgUrlInput = document.getElementById('adminImg');
    const uploadStatus = document.getElementById('uploadStatus');

    // IMAGE UPLOAD
    uploadBtn.addEventListener('click', async () => {
        if (!fileInput.files || fileInput.files.length === 0) {
            alert('Please select an image file first.');
            return;
        }

        const file = fileInput.files[0];
        const formData = new FormData();
        formData.append('image', file);

        uploadBtn.textContent = 'Uploading...';
        uploadBtn.disabled = true;
        uploadStatus.textContent = '';

        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                imgUrlInput.value = data.data.url;
                uploadStatus.textContent = 'Upload successful ✅';
                uploadStatus.style.color = '#4CAF50';
            } else {
                uploadStatus.textContent = 'Upload failed ❌';
                uploadStatus.style.color = '#f44336';
            }
        } catch (err) {
            uploadStatus.textContent = 'Upload error: ' + err.message;
            uploadStatus.style.color = '#f44336';
        } finally {
            uploadBtn.textContent = 'Upload';
            uploadBtn.disabled = false;
        }
    });

    // GENERATE LINK
    document.getElementById('generateBtn').addEventListener('click', async () => {

        const payload = {
            name: document.getElementById('adminName').value,
            dest: document.getElementById('adminDest').value,
            date: document.getElementById('adminDate').value,
            duration: document.getElementById('adminDuration').value,
            travelers: document.getElementById('adminTravelers').value,
            msg: document.getElementById('adminMessage').value,
            img: document.getElementById('adminImg').value
        };

        try {
            const response = await fetch('/api/passes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (data.id) {
                const finalUrl = `${window.location.origin}/index.html?id=${data.id}`;

                document.getElementById('resultUrl').value = finalUrl;
                document.getElementById('resultBox').classList.remove('hidden');

                navigator.clipboard.writeText(finalUrl);
            } else {
                alert('Error generating link');
            }

        } catch (err) {
            console.error(err);
            alert('Server error generating link');
        }
    });

    // COPY BUTTON
    document.getElementById('copyBtn').addEventListener('click', () => {
        const resultUrl = document.getElementById('resultUrl');
        resultUrl.select();
        navigator.clipboard.writeText(resultUrl.value);
    });
</script>
