<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnif - Admin Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <div class="admin-container">
        <div class="header">
            <h2>MAGNIF <span style="font-weight: 300; color: #a1a1a1;">ADMIN</span></h2>
            <p>Generate custom boarding passes</p>
        </div>

        <div class="form-group">
            <label>Passenger Name</label>
            <input type="text" id="adminName" placeholder="e.g. JIJISHA" value="JIJISHA">
        </div>

        <div class="form-group">
            <label>Destination Location</label>
            <input type="text" id="adminDest" placeholder="e.g. London, UK" value="London, UK">
        </div>

        <div class="form-group">
            <label>Trip Date</label>
            <input type="text" id="adminDate" placeholder="e.g. 25 June 2025" value="25 June 2025">
        </div>

        <div class="form-group">
            <label>Duration</label>
            <input type="text" id="adminDuration" placeholder="e.g. 5 Days / 4 Nights" value="5 Days / 4 Nights">
        </div>

        <div class="form-group">
            <label>Travelers</label>
            <input type="text" id="adminTravelers" placeholder="e.g. 2 People" value="2 People">
        </div>

        <div class="form-group">
            <label>Custom Message</label>
            <textarea id="adminMessage"
                rows="5">Dear Jijisha,&#10;&#10;This isn’t just a trip…&#10;it’s a story waiting to happen.&#10;&#10;Let’s make it unforgettable ✨</textarea>
        </div>

        <div class="form-group">
            <label>Destination Image (Optional)</label>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="file" id="adminImgFile" accept="image/*" style="flex: 1;">
                <button id="uploadBtn"
                    style="padding: 0 1rem; background: #3d3126; color: #d4af37; border: 1px solid #d4af37; border-radius: 8px; cursor: pointer; transition: background 0.3s;">Upload</button>
            </div>
            <div id="uploadStatus" style="font-size: 0.8rem; margin-bottom: 10px;"></div>
            <input type="text" id="adminImg"
                placeholder="Or paste an image URL directly here... (Leave blank for default)">
        </div>

        <button class="generate-btn" id="generateBtn">Generate Link</button>

        <div class="result-box hidden" id="resultBox">
            <label>Your Custom Boarding Pass URL:</label>
            <textarea id="resultUrl" readonly rows="4"></textarea>
            <button class="copy-btn" id="copyBtn">Copy Link</button>
            <p style="font-size: 0.75rem; color: #888; margin-top: 10px;">Write this link to your NFC card!</p>
        </div>
    </div>

    <script>
        // --- IMAGE UPLOAD LOGIC ---
        // IMPORTANT: Paste your free ImgBB API key below to enable image uploads!
        const IMGBB_API_KEY = '736039f4a67aa41a88a5e6c98662e01d';

        const fileInput = document.getElementById('adminImgFile');
        const uploadBtn = document.getElementById('uploadBtn');
        const imgUrlInput = document.getElementById('adminImg');
        const uploadStatus = document.getElementById('uploadStatus');

        uploadBtn.addEventListener('click', async () => {
            if (!fileInput.files || fileInput.files.length === 0) {
                alert('Please select an image file first.');
                return;
            }
            if (!IMGBB_API_KEY) {
                alert("API key missing");
                return;
            };
        }

            const file = fileInput.files[0];
        const formData = new FormData();
        formData.append('image', file);
        formData.append('key', IMGBB_API_KEY);

        uploadBtn.textContent = 'Uploading...';
        uploadBtn.disabled = true;
        uploadStatus.textContent = '';

        try {
            const response = await fetch('https://api.imgbb.com/1/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (data.success) {
                imgUrlInput.value = data.data.url;
                uploadStatus.textContent = 'Upload successful!';
                uploadStatus.style.color = '#4CAF50';
            } else {
                uploadStatus.textContent = 'Upload failed: ' + data.error.message;
                uploadStatus.style.color = '#f44336';
            }
        } catch (err) {
            uploadStatus.textContent = 'Upload error: ' + err.message;
            uploadStatus.style.color = '#f44336';
        } finally {
            uploadBtn.textContent = 'Upload';
            uploadBtn.disabled = false;
        }
        });

        // --- URL GENERATOR LOGIC ---
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const generateBtn = document.getElementById('generateBtn');
            generateBtn.textContent = 'Generating...';
            generateBtn.disabled = true;

            const payload = {
                name: document.getElementById('adminName').value,
                dest: document.getElementById('adminDest').value,
                date: document.getElementById('adminDate').value,
                duration: document.getElementById('adminDuration').value,
                travelers: document.getElementById('adminTravelers').value,
                msg: document.getElementById('adminMessage').value,
                img: document.getElementById('adminImg').value
            };

            try {
                const response = await fetch('/api/passes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.id) {
                    const baseUrl = window.location.origin + window.location.pathname.replace('admin.html', 'index.html');
                    const finalUrl = `${baseUrl}?id=${data.id}`;

                    const resultBox = document.getElementById('resultBox');
                    const resultUrl = document.getElementById('resultUrl');

                    resultUrl.value = finalUrl;
                    resultBox.classList.remove('hidden');

                    // Auto copy
                    navigator.clipboard.writeText(finalUrl);
                    document.getElementById('copyBtn').textContent = 'Copied!';
                    setTimeout(() => {
                        document.getElementById('copyBtn').textContent = 'Copy Link';
                    }, 2000);
                } else {
                    alert('Error generating link');
                }
            } catch (err) {
                console.error(err);
                alert('Server error generating link. Make sure the Node.js backend is running.');
            } finally {
                generateBtn.textContent = 'Generate Link';
                generateBtn.disabled = false;
            }
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            const resultUrl = document.getElementById('resultUrl');
            resultUrl.select();
            navigator.clipboard.writeText(resultUrl.value);
            document.getElementById('copyBtn').textContent = 'Copied!';
            setTimeout(() => {
                document.getElementById('copyBtn').textContent = 'Copy Link';
            }, 2000);
        });
    </script>
</body>

</html>
