<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
</head>

<body>

    <h2>Admin Panel</h2>

    <input id="adminName" placeholder="Name"><br><br>
    <input id="adminDest" placeholder="Destination"><br><br>
    <input id="adminDate" placeholder="Date"><br><br>
    <input id="adminDuration" placeholder="Duration"><br><br>
    <input id="adminTravelers" placeholder="Travelers"><br><br>

    <textarea id="adminMessage" placeholder="Message"></textarea><br><br>

    <input type="file" id="adminImgFile">
    <button id="uploadBtn">Upload</button>
    <p id="uploadStatus"></p>

    <input id="adminImg" placeholder="Image URL"><br><br>

    <button id="generateBtn">Generate Link</button>

    <div id="resultBox" style="display:none;">
        <textarea id="resultUrl"></textarea>
        <button id="copyBtn">Copy</button>
    </div>

    <script>
        const IMGBB_API_KEY = "736039f4a67aa41a88a5e6c98662e01d";

        const fileInput = document.getElementById('adminImgFile');
        const uploadBtn = document.getElementById('uploadBtn');
        const imgUrlInput = document.getElementById('adminImg');
        const uploadStatus = document.getElementById('uploadStatus');

        uploadBtn.addEventListener('click', async () => {
            if (!fileInput.files.length) {
                alert("Select file first");
                return;
            }

            const formData = new FormData();
            formData.append("image", fileInput.files[0]);

            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });

            const data = await res.json();
            imgUrlInput.value = data.data.url;
            uploadStatus.innerText = "Uploaded";
        });

        document.getElementById('generateBtn').addEventListener('click', async () => {

            const payload = {
                name: document.getElementById('adminName').value,
                dest: document.getElementById('adminDest').value,
                date: document.getElementById('adminDate').value,
                duration: document.getElementById('adminDuration').value,
                travelers: document.getElementById('adminTravelers').value,
                msg: document.getElementById('adminMessage').value,
                img: document.getElementById('adminImg').value
            };

            const res = await fetch('/api/passes', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            const link = `${window.location.origin}/index.html?id=${data.id}`;

            document.getElementById('resultBox').style.display = "block";
            document.getElementById('resultUrl').value = link;
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(document.getElementById('resultUrl').value);
        });
    </script>

</body>

</html>
